name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

# Least privilege the deploy needs: read the repo, write Pages, mint the OIDC token.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let a newer push supersede an in-flight one.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - name: Assemble Pages site (landing + per-app subpaths)
        run: |
          mkdir -p dist
          cp -r apps/ca-instrument/dist dist/ca-instrument
          cp -r apps/cost-model/dist dist/cost-model
          cp landing/index.html dist/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
